<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة إدارة الشهادات</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Cairo,sans-serif;
background:#f5f7fb;
padding:30px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
}

h2{
text-align:center;
color:#0B3C5D;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

button{
width:100%;
padding:14px;
background:#0B3C5D;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

#result{
margin-top:20px;
padding:15px;
background:#eef7ff;
border-radius:10px;
word-break:break-all;
}

</style>
</head>

<body>

<div class="container">

<h2>لوحة إصدار الشهادات</h2>

<input id="name" placeholder="اسم المتدرب">

<input id="course" placeholder="اسم الدورة">

<input id="trainer" placeholder="اسم المدرب">

<input id="date" placeholder="تاريخ الإصدار">

<button onclick="generate()">إنشاء بيانات الشهادة</button>

<div id="result"></div>

</div>

<script>

function generate(){

let id=Date.now();

let url=`https://phoenix2training4center9.github.io/training-center/verify.html?id=${id}`;

document.getElementById("result").innerHTML=`
<p><b>رقم الشهادة:</b> ${id}</p>
<p><b>رابط التحقق:</b></p>
<p>${url}</p>
<p>انسخ البيانات وأضفها إلى قاعدة الشهادات في verify.html.</p>
`;

}

</script>

</body>
</html>
