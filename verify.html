<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>التحقق من الشهادات</title>

<style>

body{
margin:0;
font-family:Cairo,sans-serif;
background:#f4f7fb;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.card{
background:white;
width:90%;
max-width:650px;
padding:35px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,.15);
text-align:center;
}

.logo{
width:90px;
margin-bottom:15px;
}

h1{
color:#0B3C5D;
margin-bottom:5px;
}

.success{
color:#0f9d58;
font-size:22px;
font-weight:bold;
margin-bottom:20px;
}

.row{
display:flex;
justify-content:space-between;
padding:12px 0;
border-bottom:1px solid #eee;
}

.label{
font-weight:bold;
color:#0B3C5D;
}

.value{
color:#333;
}

.notfound{
color:red;
font-size:22px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="card">

<img src="logo.png" class="logo">

<h1>Phoenix Training Center</h1>

<div id="content"></div>

</div>

<script>

const database={

"202607050001":{

name:"Bashar Mohammed Ali Mohammed",

course:"هندسة الذكاء الاصطناعي والأمن السيبراني",

trainer:"المهندس مالك عبد الباقي محمد",

date:"05 يوليو 2026",

status:"معتمدة"

}

};

const params=new URLSearchParams(location.search);

const id=params.get("id");

const c=document.getElementById("content");

if(database[id]){

const d=database[id];

c.innerHTML=`

<div class="success">✅ الشهادة معتمدة</div>

<div class="row"><span class="label">الاسم</span><span class="value">${d.name}</span></div>

<div class="row"><span class="label">الدورة</span><span class="value">${d.course}</span></div>

<div class="row"><span class="label">المدرب</span><span class="value">${d.trainer}</span></div>

<div class="row"><span class="label">التاريخ</span><span class="value">${d.date}</span></div>

<div class="row"><span class="label">رقم الشهادة</span><span class="value">${id}</span></div>

`;

}else{

c.innerHTML="<div class='notfound'>❌ هذه الشهادة غير موجودة أو غير صالحة</div>";

}

</script>

</body>
</html>
