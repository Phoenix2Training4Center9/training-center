<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>التحقق من الشهادات</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f4f4f4; font-family: Arial, sans-serif;">

    <div style="background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 400px;">
        <h2>التحقق من الشهادة</h2>
        <p>أدخل رقم الشهادة المكون من 12 خانة للتحقق من صحتها</p>
        
        <input type="text" id="certInput" placeholder="PTC-XXXX-XXXX" style="width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box;">
        
        <button onclick="verify()" style="width: 100%; padding: 12px; background: #001f3f; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">تحقق الآن</button>
        
        <div id="result" style="margin-top: 20px; font-weight: bold;"></div>
    </div>

    <script>
        function verify() {
            var val = document.getElementById('certInput').value;
            var res = document.getElementById('result');
            if(val === "PTC-2026-0001") {
                res.innerHTML = "✅ الشهادة صالحة وموثقة باسم: بشار محمد";
                res.style.color = "green";
            } else {
                res.innerHTML = "❌ رقم الشهادة غير موجود أو غير صحيح.";
                res.style.color = "red";
            }
        }
    </script>
</body>
</html>
