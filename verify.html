<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Verify Certificate</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="text-align: center; padding: 50px;">
    <h1>Certificate Verification</h1>
    <input type="text" id="certID" placeholder="Enter ID" style="padding: 10px;">
    <button onclick="check()" style="padding: 10px;">Verify</button>
    <p id="res"></p>

    <script>
        function check() {
            let id = document.getElementById('certID').value;
            if(id === "123") { document.getElementById('res').innerHTML = "Valid Certificate!"; }
            else { document.getElementById('res').innerHTML = "Invalid ID."; }
        }
    </script>
</body>
</html>
